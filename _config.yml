# Welcome to Jekyll!
#
# This config file is meant for settings that affect your entire site.
# For technical reasons, this file is *NOT* reloaded automatically.
# If you change this file, please restart the server process.

# Theme Settings
# GitHub Pages에서 테마를 적용하려면 remote_theme를 활성화해야 합니다.
remote_theme: "mmistakes/minimal-mistakes"
minimal_mistakes_skin: "dark" # "air", "aqua", "contrast", "dark", "dirt", "neon", "mint", "plum", "sunrise", "catppuccin_latte", "catppuccin_mocha"

# Site Settings
locale: "ko-KR" # 한국어 설정
rtl: false
title: "Minto의 기술 블로그"
title_separator: "-"
subtitle: "3년차 프론트엔드 개발자의 기록"
name: "Minto"
description: "프론트엔드 개발 기술과 일상을 기록하는 Minto의 블로그입니다."
url: "https://Miintoo.github.io"
baseurl: "" # 하위 경로를 쓰지 않으므로 빈 값 유지
repository: "Miintoo/Miintoo.github.io" # 본인의 유저네임/저장소명
teaser: # /assets/images/500x300.png (공유 시 나타날 기본 이미지)
logo: # /assets/images/88x88.png
masthead_title: "Minto's Dev Log"
breadcrumbs: true # 페이지 상단 경로 표시 활성화
words_per_minute: 200
enable_copy_code_button: true # 코드 복사 버튼 활성화

# Comments Settings (Giscus 추천)
comments:
  provider: "giscus" # giscus 사용 시 활성화
  giscus:
    repo_id: "" # https://giscus.app 에서 확인 후 입력
    category_name: "Announcements"
    category_id: "" # https://giscus.app 에서 확인 후 입력
    discussion_term: "pathname"
    reactions_enabled: "1"
    theme: "dark"
    strict: 1
    input_position: "bottom"
    emit_metadata: 0
    lang: "ko"
    lazy: true

# Search Settings
search: true # 검색 기능 활성화
search_full_content: true
search_provider: lunr # 기본 검색 엔진

# SEO 관련 (검색 엔진 등록 후 키값을 입력하세요)
google_site_verification: 
naver_site_verification: 

# Site Author
author:
  name: "Minto"
  avatar: "/assets/images/bio-photo.jpg" # 실제 파일 경로 확인 필요
  bio: "3년차 프론트엔드 개발자"
  location: "Korea"
  email: "xpeed96@gmail.com"
  links:
    - label: "Email"
      icon: "fas fa-fw fa-square-envelope"
      url: "mailto:xpeed96@gmail.com"
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/Miintoo"
    - label: "Instagram"
      icon: "fab fa-fw fa-instagram"
      url: "https://instagram.com/자신의아이디"

# Site Footer
footer:
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/Miintoo"
  since: "2024" # 블로그 시작 연도

# Reading Files
include:
  - .htaccess
  - _pages
exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - vendor
  - .asset-cache
  - .bundle
  - .jekyll-assets-cache
  - .sass-cache
  - node_modules
  - package.json
  - package-lock.json
  - Gemfile
  - Gemfile.lock
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - docs/ 
  - test/
  - /docs/
  - /test/

# Conversion & Markdown
markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false

kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo

# Outputting
permalink: /:categories/:title/
timezone: "Asia/Seoul" # 한국 시간대 설정

# Pagination
paginate: 10
paginate_path: /page:num/

# Plugins
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  # - jekyll-include-cache

# Archives
category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/

# Defaults for Posts
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true # 사이드바 프로필 노출
      read_time: true
      comments: true # 모든 포스트 댓글 기본 활성화
      share: true
      related: true
